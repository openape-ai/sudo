[advisories]
ignore = [
    # rsa 0.9.x is a phantom dependency — listed in Cargo.lock as an optional
    # (unactivated) dependency of ssh-key 0.6.x but never compiled.
    # Cargo records all optional deps in the lockfile regardless of feature activation.
    # See: https://github.com/rust-lang/cargo/issues/11463
    "RUSTSEC-2023-0071",
]
